name: Deploy Notification Service Producer Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'producer/**'
      - ".github/workflows/producer-lambda-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD
    defaults:
      run:
        working-directory: producer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: producer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Remove development dependencies
        run: npm prune --omit=dev

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment package
        run: |
          zip -r lambda.zip \
            dist \
            node_modules \
            prisma \
            certs \
            package.json \
            package-lock.json

      - name: Upload deployment package to S3
        run: |
          aws s3 cp lambda.zip \
            s3://${{ secrets.DEPLOYMENT_BUCKET }}/lambda.zip

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.DEPLOYMENT_BUCKET }} \
            --s3-key lambda.zip

      - name: Wait for deployment
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}