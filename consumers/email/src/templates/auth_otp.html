<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; background:#f9fafb; padding:24px;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table width="480" style="background:#ffffff; padding:24px; border-radius:8px;">
            <tr>
              <td>
                <h2 style="margin-bottom:16px;">Verify your sign-in</h2>
                <p>Your verification code for <strong>{{service}}</strong> is:</p>

                <div style="font-size:28px; font-weight:bold; margin:24px 0;">
                  {{otp}}
                </div>

                <p>This code expires in {{expiresIn}}.</p>

                <p style="color:#6b7280; font-size:12px; margin-top:24px;">
                  If you didn’t request this, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
